name: build
on:
  push:
    branches: main
jobs:
  build_android:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message,'[Build.apk]')
    permissions:
        contents: write
        repository-projects: write
    steps:
        - name: Upload build artifact 
          uses: actions/upload-artifact@v4
          with: 
            name: build_apk
            path: ./testFile.txt
        - name: Get workflow run ID Okay
          id: get_run_id 
          run: |
            echo "run_id=${{ github.run_id }}" >> $GITHUB_ENV
            echo "${{env.run_id}}"
          
        - name: List artifacts 
          id: list_artifacts 
          run: |
            curl -L \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repo/${{github.repository}}/actions/runs/${{env.run_id}}/artifacts \
              > artifacts.json

        - name: Parse artifacts URL 
          id: parse_artifacts_url 
          run: | 
            artifact_url=$(jq -r '.artifacts[0].archive_download_url' artifacts.json) 
            echo "artifact_url=${artifact_url}" >> $GITHUB_ENV
            echo "${{env.artifact_url}}"
